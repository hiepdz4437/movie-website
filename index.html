<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Top 10 - Detailed Edition</title>
    <style>
        :root { --netflix-red: #e50914; --bg-black: #050505; --card-bg: #181818; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: var(--bg-black); color: white; line-height: 1.6; overflow-x: hidden; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 0 4%; }
        header { text-align: center; padding: 80px 0 40px; background: linear-gradient(to bottom, rgba(229, 9, 20, 0.2), transparent); }
        header h1 { font-size: clamp(2.5rem, 5vw, 4rem); margin-bottom: 20px; text-transform: uppercase; }

        /* GRID LAYOUT */
        .top-10-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; margin-top: 50px; }
        .rank-card { display: flex; align-items: flex-end; position: relative; cursor: pointer; transition: 0.4s ease; }
        .rank-card:hover { transform: scale(1.1); z-index: 10; }
        .rank-number { font-size: 160px; font-weight: 900; line-height: 0.8; color: var(--bg-black); -webkit-text-stroke: 4px #595959; margin-right: -30px; z-index: 1; }
        .poster { width: 180px; height: 260px; border-radius: 4px; object-fit: cover; z-index: 2; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }

        /* TRANG CHI TIẾT (FULL SCREEN MODAL) */
        .page-detail {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-black); display: none; overflow-y: auto; z-index: 9999;
        }
        .hero-detail {
            height: 60vh; width: 100%; position: relative;
            background-size: cover; background-position: center;
        }
        .hero-overlay {
            position: absolute; bottom: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, var(--bg-black), transparent);
        }
        .content-body { padding: 40px 8%; margin-top: -100px; position: relative; z-index: 10; }
        .movie-title { font-size: 3rem; margin: 0; color: var(--netflix-red); }
        .meta-info { display: flex; gap: 20px; margin: 20px 0; color: #aaa; font-weight: bold; }
        .description { font-size: 1.2rem; max-width: 800px; color: #efefef; }
        
        .close-detail {
            position: fixed; top: 20px; right: 30px; font-size: 40px;
            cursor: pointer; z-index: 10000; color: white; text-shadow: 0 0 10px black;
        }

        /* PHẦN KẾT & BÌNH LUẬN */
        footer { background: #111; padding: 60px 0; border-top: 1px solid #333; margin-top: 50px; }
        .comment-box { background: #181818; padding: 20px; border-radius: 8px; }
        textarea { width: 100%; background: #333; border: none; color: white; padding: 15px; border-radius: 4px; box-sizing: border-box; }
        .btn-send { background: var(--netflix-red); color: white; border: none; padding: 10px 25px; margin-top: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <h1>TOP 10 SERIES HAY NHẤT</h1>
            <p style="color: #b3b3b3;">Tuyển tập những kiệt tác điện ảnh đỉnh cao bạn không thể bỏ lỡ.</p>
        </div>
    </header>

    <main class="container">
        <div class="top-10-grid">
            <div class="rank-card" onclick="showDetail('breakingbad')">
                <span class="rank-number">1</span>
                <img src="images/bb.jfif" class="poster">
            </div>
            <div class="rank-card" onclick="showDetail('saul')">
                <span class="rank-number">2</span>
                <img src="images/bcs.jpg" class="poster">
            </div>
            </div>
    </main>

    <div id="pageDetail" class="page-detail">
        <span class="close-detail" onclick="closeDetail()">&times;</span>
        <div id="detailContent"></div>
    </div>

    <footer>
        <div class="container">
            <h3>Cảm nghĩ của bạn</h3>
            <div class="comment-box">
                <textarea id="commentInput" rows="3" placeholder="Viết bình luận..."></textarea>
                <button class="btn-send" onclick="addComment()">Gửi</button>
            </div>
            <div id="commentList" style="margin-top:20px;"></div>
        </div>
    </footer>

    <script>
        const movieData = {
            breakingbad: {
                title: "Breaking Bad",
                year: "2008 - 2013",
                tags: "Tâm lý, Tội phạm",
                desc: "Walter White, một giáo viên hóa học hiền lành, phát hiện mình bị ung thư. Để đảm bảo tương lai tài chính cho gia đình, ông dấn thân vào con đường sản xuất ma túy đá tinh khiết nhất thế giới.",
                bg: "images/bb_cover.jpg", // Ảnh nền lớn nằm ngang
                highlight: "Hành trình từ một người cha mẫu mực trở thành 'ông trùm' Heisenberg đầy tàn nhẫn."
            },
            saul: {
                title: "Better Call Saul",
                year: "2015 - 2022",
                tags: "Chính kịch, Luật pháp",
                desc: "Trước khi trở thành luật sư của Walter White, Jimmy McGill chỉ là một kẻ lừa đảo nhỏ đang cố gắng làm lại cuộc đời.",
                bg: "images/bcs_cover.jpg",
                highlight: "Một trong những phim tiền truyện xuất sắc nhất lịch sử điện ảnh."
            }
        };

        function showDetail(id) {
            const film = movieData[id];
            if(!film) return;

            const html = `
                <div class="hero-detail" style="background-image: url('${film.bg}')">
                    <div class="hero-overlay"></div>
                </div>
                <div class="content-body">
                    <h1 class="movie-title">${film.title}</h1>
                    <div class="meta-info">
                        <span>${film.year}</span>
                        <span style="border: 1px solid #666; padding: 0 5px;">18+</span>
                        <span style="color: var(--netflix-red);">${film.tags}</span>
                    </div>
                    <p class="description">${film.desc}</p>
                    <div style="margin-top: 30px; border-left: 4px solid var(--netflix-red); padding-left: 15px;">
                        <p><i>"${film.highlight}"</i></p>
                    </div>
                </div>
            `;
            document.getElementById("detailContent").innerHTML = html;
            document.getElementById("pageDetail").style.display = "block";
            document.body.style.overflow = "hidden"; // Chặn cuộn trang chính
        }

        function closeDetail() {
            document.getElementById("pageDetail").style.display = "none";
            document.body.style.overflow = "auto";
        }

        function addComment() {
            const val = document.getElementById("commentInput").value;
            if(!val) return;
            const item = document.createElement("p");
            item.innerHTML = `<b>Bạn:</b> ${val}`;
            document.getElementById("commentList").prepend(item);
            document.getElementById("commentInput").value = "";
        }
    </script>
</body>
</html>
