<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Series</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #141414; color: white; }
        .hero { height: 40vh; background: linear-gradient(to top, #141414, transparent); display: flex; align-items: center; padding: 40px; }
        .row { margin: 20px; }
        .scroll { display: flex; overflow-x: auto; gap: 15px; padding: 20px 0; }
        .card { min-width: 200px; height: 300px; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; background: #333; }
        .card:hover { transform: scale(1.05); z-index: 10; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        /* POPUP STYLES */
        .popup { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); 
            display: none; /* Mặc định ẩn */
            justify-content: center; align-items: center; z-index: 1000; 
        }
        .popup-content { 
            background: #1e293b; max-width: 500px; width: 90%; 
            padding: 30px; border-radius: 15px; position: relative; 
            line-height: 1.6; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .close { position: absolute; top: 10px; right: 20px; cursor: pointer; font-size: 30px; color: #ccc; }
        .close:hover { color: white; }
    </style>
</head>
<body>

<div class="hero">
    <h1>Top Series Nên Xem Một Lần Trong Đời</h1>
</div>

<div class="row">
    <div class="scroll">
        <div class="card" onclick="openPopup('breakingbad')"><img src="images/bb.jfif" alt="Breaking Bad"></div>
        <div class="card" onclick="openPopup('saul')"><img src="images/bcs.jpg" alt="Better Call Saul"></div>
        <div class="card" onclick="openPopup('dexter')"><img src="images/dexter.png" alt="Dexter"></div>
        <div class="card" onclick="openPopup('prison')"><img src="images/ps.png" alt="Prison Break"></div>
        <div class="card" onclick="openPopup('got')"><img src="images/got.jfif" alt="Game of Thrones"></div>
        <div class="card" onclick="openPopup('boys')"><img src="images/tb.png" alt="The Boys"></div>
    </div>
</div>

<div id="popup" class="popup" onclick="closePopupOutside(event)">
    <div class="popup-content">
        <span class="close" onclick="closePopup()">&times;</span>
        <div id="content"></div>
    </div>
</div>

<script>
    const data = {
        breakingbad: `<h2>Breaking Bad</h2><p><b>Chủ đề:</b> Tha hóa và quyền lực</p><p><b>Tóm tắt:</b> Một giáo viên hóa học biến thành trùm ma túy...</p>`,
        saul: `<h2>Better Call Saul</h2><p><b>Chủ đề:</b> Lựa chọn và hệ quả</p><p><b>Tóm tắt:</b> Hành trình luật sư nhỏ trở thành kẻ thao túng...</p>`,
        dexter: `<h2>Dexter</h2><p><b>Chủ đề:</b> Đạo đức xám</p><p><b>Tóm tắt:</b> Sát nhân chỉ giết kẻ xấu...</p>`,
        prison: `<h2>Prison Break</h2><p><b>Chủ đề:</b> Trí tuệ và chiến lược</p><p><b>Tóm tắt:</b> Kế hoạch vượt ngục thiên tài...</p>`,
        got: `<h2>Game of Thrones</h2><p><b>Chủ đề:</b> Quyền lực và chính trị</p><p><b>Tóm tắt:</b> Chiến tranh giữa các gia tộc...</p>`,
        boys: `<h2>The Boys</h2><p><b>Chủ đề:</b> Tha hóa quyền lực</p><p><b>Tóm tắt:</b> Siêu anh hùng bị biến chất...</p>`
    };

    function openPopup(key) {
        const popup = document.getElementById("popup");
        const content = document.getElementById("content");
        if (data[key]) {
            content.innerHTML = data[key];
            popup.style.display = "flex";
        }
    }

    function closePopup() {
        document.getElementById("popup").style.display = "none";
    }

    // Thêm tính năng: Click ra ngoài hộp thông tin để đóng
    function closePopupOutside(event) {
        if (event.target.id === "popup") {
            closePopup();
        }
    }
</script>

</body>
</html>
